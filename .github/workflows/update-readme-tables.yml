name: (Shared) Update README Tables

on:
  workflow_call:
    secrets:
      PAT_TOKEN:
        required: true
        description: "PAT with org admin read access for fetching runner/group/image/network data"

permissions:
  contents: write

jobs:
  update-readme-tables:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate token
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "::error::PAT_TOKEN secret is not set"
            exit 1
          fi
          gh auth status

      - name: Fetch data and update tables
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          PREFIX="gitpaulo"
          BASE_URL="https://github.com/organizations/${OWNER}/settings/actions"
          REPO_URL="https://github.com/${OWNER}/${REPO}"
          RUNNERS_FILE=$(mktemp)
          GROUPS_FILE=$(mktemp)
          IMAGES_FILE=$(mktemp)
          RUNNER_IMAGES_FILE=$(mktemp)
          NETWORKS_FILE=$(mktemp)
          LHR_CACHE=$(mktemp)
          API_OK=false

          # Helper: manual pagination (gh --paginate is unreliable for nested endpoints)
          paginate() {
            local endpoint="$1" arraykey="$2" jqfilter="$3" output="$4"
            local page=1
            while true; do
              local raw
              raw=$(gh api "${endpoint}?per_page=100&page=${page}" 2>/dev/null) || return 1
              local result
              result=$(echo "$raw" | jq -r ".${arraykey}[] | ${jqfilter}" 2>/dev/null)
              [[ -n "$result" ]] && echo "$result" >> "$output"
              local count
              count=$(echo "$raw" | jq ".${arraykey} | length" 2>/dev/null)
              page=$((page + 1))
              [[ "$count" -lt 100 ]] && break
            done
            return 0
          }

          # --- Org self-hosted runners ---
          if paginate "/orgs/${OWNER}/actions/runners" "runners" \
            "select(.name | contains(\"${PREFIX}\")) |
              \"| \(.name) | self-hosted | \(.os) | \(.status) | \([.labels[].name] | join(\", \")) | org |\"" \
            "$RUNNERS_FILE"; then
            API_OK=true
          fi

          # --- Repo self-hosted runners ---
          if gh api --paginate "/repos/${OWNER}/${REPO}/actions/runners" \
            --jq ".runners[] | select(.name | contains(\"${PREFIX}\")) |
              \"| \(.name) | self-hosted | \(.os) | \(.status) | \([.labels[].name] | join(\", \")) | repo |\"" \
            >> "$RUNNERS_FILE" 2>/dev/null; then
            API_OK=true
          fi

          # --- Org larger hosted runners (LHR) — fetch raw JSON cache ---
          LHR_OK=false
          page=1
          while true; do
            CHUNK=$(gh api "/orgs/${OWNER}/actions/hosted-runners?per_page=100&page=${page}" 2>/dev/null) || break
            echo "$CHUNK" | jq -c '.runners[]' >> "$LHR_CACHE" 2>/dev/null
            COUNT=$(echo "$CHUNK" | jq '.runners | length' 2>/dev/null)
            page=$((page + 1))
            LHR_OK=true
            [[ "$COUNT" -lt 100 ]] && break
          done

          if [[ "$LHR_OK" == "true" ]]; then
            API_OK=true

            # Filter LHR runners for the table
            jq -r --arg prefix "$PREFIX" --arg base "$BASE_URL" '
              select(.name | contains($prefix)) |
              "| [\(.name)](\($base)/github-hosted-runners/\(.id)) | larger-hosted | \(.platform) | \(.status) | \(.machine_size_details.id // "N/A") | org | \(if .image_gen then "Yes" else "No" end) |"
            ' "$LHR_CACHE" >> "$RUNNERS_FILE" 2>/dev/null || true

            # Filter runners using custom images (runner <-> image mapping)
            jq -r --arg prefix "$PREFIX" --arg base "$BASE_URL" '
              select(.name | contains($prefix)) | select(.image_details.source == "custom") |
              "| [\(.name)](\($base)/github-hosted-runners/\(.id)) | \(.image_details.display_name) | \(.image_details.version) | \(.status) |"
            ' "$LHR_CACHE" >> "$RUNNER_IMAGES_FILE" 2>/dev/null || true
          fi

          # --- Custom images (standalone definitions) ---
          CUSTOM_IMAGES=$(gh api "/orgs/${OWNER}/actions/hosted-runners/images/custom" 2>/dev/null) || true
          if [[ -n "$CUSTOM_IMAGES" ]]; then
            API_OK=true
            echo "$CUSTOM_IMAGES" | jq -r --arg prefix "$PREFIX" --arg base "$BASE_URL" '
              (if type == "array" then . elif has("images") then .images else [.] end)[] |
              select(.name | contains($prefix)) |
              "| [\(.name)](\($base)/custom-images/\(.id)/versions) | - | \(.latest_version // "N/A") | \(.total_versions_size // 0) | \(.platform // "N/A") | \(.state // "N/A") |"
            ' >> "$IMAGES_FILE" 2>/dev/null || true
          fi

          # --- Org runner groups ---
          if paginate "/orgs/${OWNER}/actions/runner-groups" "runner_groups" \
            "select(.name | contains(\"${PREFIX}\")) |
              \"| [\(.name)](${BASE_URL}/runner-groups/\(.id)) | \(.visibility) | \(.default) |\"" \
            "$GROUPS_FILE"; then
            API_OK=true
          fi

          # --- Org network configurations ---
          if paginate "/orgs/${OWNER}/settings/network-configurations" "network_configurations" \
            "select(.name | contains(\"${PREFIX}\")) |
              \"| \(.name) | \(.compute_service) | \(.network_settings_ids | length) | \(.created_on | split(\"T\")[0]) |\"" \
            "$NETWORKS_FILE"; then
            API_OK=true
          fi

          rm -f "$LHR_CACHE"

          # Abort if every API call failed
          if [[ "$API_OK" != "true" ]]; then
            echo "::error::All API calls failed. Skipping update to avoid overwriting existing data."
            rm -f "$RUNNERS_FILE" "$GROUPS_FILE" "$IMAGES_FILE" "$RUNNER_IMAGES_FILE" "$NETWORKS_FILE"
            exit 1
          fi

          # --- Fallback for empty tables ---
          RUNNERS_EMPTY=false
          GROUPS_EMPTY=false
          IMAGES_EMPTY=false
          NETWORKS_EMPTY=false
          if [[ ! -s "$RUNNERS_FILE" ]]; then
            echo "No runners found matching \`*${PREFIX}*\`." > "$RUNNERS_FILE"
            RUNNERS_EMPTY=true
          fi
          if [[ ! -s "$GROUPS_FILE" ]]; then
            echo "No runner groups found matching \`*${PREFIX}*\`." > "$GROUPS_FILE"
            GROUPS_EMPTY=true
          fi
          if [[ ! -s "$IMAGES_FILE" ]]; then
            echo "No custom images found matching \`*${PREFIX}*\`." > "$IMAGES_FILE"
            IMAGES_EMPTY=true
          fi
          if [[ ! -s "$NETWORKS_FILE" ]]; then
            echo "No network configurations found matching \`*${PREFIX}*\`." > "$NETWORKS_FILE"
            NETWORKS_EMPTY=true
          fi

          # --- Sort table rows by name column (field 2 when split by |) ---
          for f in "$RUNNERS_FILE" "$GROUPS_FILE" "$IMAGES_FILE" "$NETWORKS_FILE"; do
            if [[ -s "$f" ]] && grep -q '^|' "$f"; then
              sort -t'|' -k2,2f "$f" -o "$f"
            fi
          done

          # --- Replace runners table ---
          R_HEADER="| Name | Type | OS | Status | Labels | Scope | Img Gen |"
          R_SEP="| --- | --- | --- | --- | --- | --- | --- |"

          awk -v header="$R_HEADER" -v sep="$R_SEP" -v rowsfile="$RUNNERS_FILE" -v empty="$RUNNERS_EMPTY" -v repourl="$REPO_URL" '
            /<!-- RUNNERS_TABLE_START -->/ {
              print "<!-- RUNNERS_TABLE_START -->"
              if (empty != "true") { print header; print sep }
              while ((getline line < rowsfile) > 0) print line
              close(rowsfile)
              print ""
              print "> [Test Runner Info](" repourl "/actions/workflows/test-runner-info.yml)"
              skip=1; next
            }
            /<!-- RUNNERS_TABLE_END -->/ { print; skip=0; next }
            !skip { print }
          ' README.md > README.md.tmp

          # --- Replace groups table ---
          G_HEADER="| Name | Visibility | Default |"
          G_SEP="| --- | --- | --- |"

          awk -v header="$G_HEADER" -v sep="$G_SEP" -v rowsfile="$GROUPS_FILE" -v empty="$GROUPS_EMPTY" -v repourl="$REPO_URL" '
            /<!-- GROUPS_TABLE_START -->/ {
              print "<!-- GROUPS_TABLE_START -->"
              if (empty != "true") { print header; print sep }
              while ((getline line < rowsfile) > 0) print line
              close(rowsfile)
              print ""
              print "> [Test Runner Group](" repourl "/actions/workflows/test-runner-group.yml)"
              skip=1; next
            }
            /<!-- GROUPS_TABLE_END -->/ { print; skip=0; next }
            !skip { print }
          ' README.md.tmp > README.md.tmp2

          # --- Replace images table ---
          I_HEADER="| Name | Version | Size (GB) | Platform | Status |"
          I_SEP="| --- | --- | --- | --- | --- |"
          RI_HEADER="| Runner | Image | Version | Status |"
          RI_SEP="| --- | --- | --- | --- |"
          RUNNER_IMAGES_EMPTY=false
          if [[ ! -s "$RUNNER_IMAGES_FILE" ]]; then
            RUNNER_IMAGES_EMPTY=true
          else
            sort -t'|' -k2,2f "$RUNNER_IMAGES_FILE" -o "$RUNNER_IMAGES_FILE"
          fi

          awk -v header="$I_HEADER" -v sep="$I_SEP" -v rowsfile="$IMAGES_FILE" -v empty="$IMAGES_EMPTY" \
              -v riheader="$RI_HEADER" -v risep="$RI_SEP" -v rifile="$RUNNER_IMAGES_FILE" -v riempty="$RUNNER_IMAGES_EMPTY" \
              -v repourl="$REPO_URL" '
            /<!-- IMAGES_TABLE_START -->/ {
              print "<!-- IMAGES_TABLE_START -->"
              if (empty != "true") { print header; print sep }
              while ((getline line < rowsfile) > 0) print line
              close(rowsfile)
              if (riempty != "true") {
                print ""
                print riheader
                print risep
                while ((getline line < rifile) > 0) print line
                close(rifile)
              }
              print ""
              print "> [Test Custom Image](" repourl "/actions/workflows/test-custom-image.yml) · [Test Generate Custom Image](" repourl "/actions/workflows/test-generate-custom-image.yml)"
              skip=1; next
            }
            /<!-- IMAGES_TABLE_END -->/ { print; skip=0; next }
            !skip { print }
          ' README.md.tmp2 > README.md.tmp3

          # --- Replace networks table ---
          N_HEADER="| Name | Compute Service | Network Settings | Created |"
          N_SEP="| --- | --- | --- | --- |"

          awk -v header="$N_HEADER" -v sep="$N_SEP" -v rowsfile="$NETWORKS_FILE" -v empty="$NETWORKS_EMPTY" -v repourl="$REPO_URL" '
            /<!-- NETWORKS_TABLE_START -->/ {
              print "<!-- NETWORKS_TABLE_START -->"
              if (empty != "true") { print header; print sep }
              while ((getline line < rowsfile) > 0) print line
              close(rowsfile)
              print ""
              print "> [Test Network Configuration](" repourl "/actions/workflows/test-network-configuration.yml)"
              skip=1; next
            }
            /<!-- NETWORKS_TABLE_END -->/ { print; skip=0; next }
            !skip { print }
          ' README.md.tmp3 > README.md.out

          # Validate before overwriting
          if [[ ! -s README.md.out ]]; then
            echo "::error::Generated README is empty. Aborting."
            rm -f README.md.tmp README.md.tmp2 README.md.tmp3 README.md.out "$RUNNERS_FILE" "$GROUPS_FILE" "$IMAGES_FILE" "$RUNNER_IMAGES_FILE" "$NETWORKS_FILE"
            exit 1
          fi

          # --- Replace footer ---
          FOOTER="<p align=\"center\"><a href=\"${REPO_URL}/actions/workflows/update-readme-tables.yml\">Update this README</a><br><a href=\"${REPO_URL}/actions/workflows/update-readme-tables.yml\"><img src=\"${REPO_URL}/actions/workflows/update-readme-tables.yml/badge.svg\" alt=\"Update README Tables\"></a></p>"

          if grep -q '<!-- FOOTER_START -->' README.md.out; then
            awk -v footer="$FOOTER" '
              /<!-- FOOTER_START -->/ {
                print "<!-- FOOTER_START -->"
                print footer
                skip=1; next
              }
              /<!-- FOOTER_END -->/ { print; skip=0; next }
              !skip { print }
            ' README.md.out > README.md.out2
            mv README.md.out2 README.md.out
          else
            printf "\n<!-- FOOTER_START -->\n%s\n<!-- FOOTER_END -->\n" "$FOOTER" >> README.md.out
          fi

          mv README.md.out README.md
          rm -f README.md.tmp README.md.tmp2 README.md.tmp3 "$RUNNERS_FILE" "$GROUPS_FILE" "$IMAGES_FILE" "$RUNNER_IMAGES_FILE" "$NETWORKS_FILE"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update README tables [skip ci]"
            git push
          fi
