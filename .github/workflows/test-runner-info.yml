name: Test Runner Info

on:
  workflow_call:
    inputs:
      runner_label:
        description: "Runner label"
        required: true
        type: string

jobs:
  test:
    runs-on: ${{ inputs.runner_label }}

    steps:
      - uses: actions/checkout@v4

      - name: Runner context
        run: |
          echo "::group::Runner Context"
          echo "Runner Label: ${{ inputs.runner_label }}"
          echo "Runner Name:  ${{ runner.name }}"
          echo "Runner OS:    ${{ runner.os }}"
          echo "Runner Arch:  ${{ runner.arch }}"
          echo "Runner Temp:  ${{ runner.temp }}"
          echo "Tool Cache:   ${{ runner.tool_cache }}"
          echo "Debug:        ${{ runner.debug }}"
          echo "::endgroup::"

          echo "::group::System Info"
          uname -a
          cat /etc/os-release 2>/dev/null || sw_vers 2>/dev/null || echo "Unknown OS"
          echo "::endgroup::"

      - name: Discover runner working directory
        id: discover
        run: |
          # The .runner file lives in the runner's installation root.
          # Hosted runners (HCA): typically $HOME/actions-runner/cached/<ver>/
          # Self-hosted runners:   wherever the user ran config.sh
          #
          # Strategy:
          #   1. Walk up from $GITHUB_WORKSPACE — always inside the runner tree
          #   2. Search known HCA paths
          #   3. Fallback: find under $HOME

          RUNNER_DIR=""

          # Method 1: Walk up from GITHUB_WORKSPACE (works for all runner types)
          dir="$GITHUB_WORKSPACE"
          while [ -n "$dir" ] && [ "$dir" != "/" ]; do
            if [ -f "$dir/.runner" ]; then
              RUNNER_DIR="$dir"
              break
            fi
            dir=$(dirname "$dir")
          done

          # Method 2: Search known HCA-managed paths
          if [ -z "$RUNNER_DIR" ]; then
            for root in \
              "$HOME/actions-runner" \
              "/home/runner/actions-runner" \
              "/actions-runner" \
              "C:/actions-runner" \
            ; do
              if [ -d "$root" ]; then
                found=$(find "$root" -maxdepth 3 -name ".runner" -type f 2>/dev/null | head -1)
                if [ -n "$found" ]; then
                  RUNNER_DIR=$(dirname "$found")
                  break
                fi
              fi
            done
          fi

          # Method 3: Broader search under $HOME
          if [ -z "$RUNNER_DIR" ]; then
            found=$(find "$HOME" -maxdepth 5 -name ".runner" -type f 2>/dev/null | head -1)
            [ -n "$found" ] && RUNNER_DIR=$(dirname "$found")
          fi

          if [ -n "$RUNNER_DIR" ]; then
            echo "Found runner working directory: $RUNNER_DIR"
          else
            echo "::warning::Could not locate runner working directory (.runner file not found)"
          fi
          echo "runner_dir=$RUNNER_DIR" >> "$GITHUB_OUTPUT"

      - name: Runner agent settings (.runner)
        run: |
          DIR="${{ steps.discover.outputs.runner_dir }}"
          if [ -z "$DIR" ]; then
            echo "::warning::Skipped — runner directory not found"
            exit 0
          fi
          f="$DIR/.runner"
          echo "Path: $f"
          if [ -f "$f" ]; then
            python3 -m json.tool "$f" 2>/dev/null || cat "$f"
          else
            echo "(file does not exist)"
          fi

      - name: HCA metadata (.setup_info)
        run: |
          DIR="${{ steps.discover.outputs.runner_dir }}"
          if [ -z "$DIR" ]; then
            echo "::warning::Skipped — runner directory not found"
            exit 0
          fi
          f="$DIR/.setup_info"
          echo "Path: $f"
          if [ -f "$f" ]; then
            python3 -m json.tool "$f" 2>/dev/null || cat "$f"
          else
            echo "(file does not exist)"
          fi

      - name: Runner agent version
        run: |
          DIR="${{ steps.discover.outputs.runner_dir }}"
          if [ -z "$DIR" ]; then
            echo "::warning::Skipped — runner directory not found"
            exit 0
          fi
          if [ -f "$DIR/bin/Runner.Listener" ]; then
            echo "Found: $DIR/bin/Runner.Listener (GitHub realm)"
            "$DIR/bin/Runner.Listener" --version 2>/dev/null || echo "(could not get version)"
          elif [ -f "$DIR/bin/Agent.Listener" ]; then
            echo "Found: $DIR/bin/Agent.Listener (ADO realm)"
            "$DIR/bin/Agent.Listener" --version 2>/dev/null || echo "(could not get version)"
          else
            echo "(no runner/agent binary found in $DIR/bin/)"
            ls -la "$DIR/bin/" 2>/dev/null || true
          fi

      - name: Cached runner versions
        run: |
          echo "Checking known cache directories..."
          found_any=false
          for cache in \
            "$HOME/actions-runner/cached" \
            "/home/runner/actions-runner/cached" \
            "/opt/runner-cache" \
            "/opt/pipelinesagent-cache" \
            "C:/actions-runner/cached" \
          ; do
            if [ -d "$cache" ]; then
              echo ""
              echo "Found cache: $cache"
              found_any=true
              ls -1 "$cache"/ 2>/dev/null | while read -r entry; do
                if [ -d "$cache/$entry" ]; then
                  echo "  version: $entry"
                fi
              done
            fi
          done
          if [ "$found_any" = false ]; then
            echo "(no cache directories found)"
          fi

      - name: Runner directory tree
        run: |
          ROOT=""
          for candidate in \
            "$HOME/actions-runner" \
            "/home/runner/actions-runner" \
            "/actions-runner" \
            "C:/actions-runner" \
          ; do
            if [ -d "$candidate" ]; then
              ROOT="$candidate"
              break
            fi
          done
          if [ -z "$ROOT" ]; then
            echo "(runner root directory not found)"
            exit 0
          fi
          echo "Runner root: $ROOT"
          echo ""
          echo "::group::Top-level contents"
          ls -la "$ROOT"/
          echo "::endgroup::"
          echo ""
          echo "::group::Directory tree (depth 2)"
          find "$ROOT" -maxdepth 2 -type d 2>/dev/null | sort
          echo "::endgroup::"

      - name: HCA directory (/opt/hca)
        run: |
          if [ ! -d /opt/hca ]; then
            echo "/opt/hca does not exist"
            exit 0
          fi

          echo "::group::Directory listing"
          ls -la /opt/hca/
          echo "::endgroup::"

          echo ""
          echo "::group::HCA binary version"
          if [ -x /opt/hca/hosted-compute-agent ]; then
            echo "Found: /opt/hca/hosted-compute-agent"
            /opt/hca/hosted-compute-agent --version 2>/dev/null || echo "(cannot get version)"
          else
            echo "(binary not found or not executable)"
          fi
          echo "::endgroup::"

          echo ""
          echo "::group::.settings (redacted)"
          if [ -f /opt/hca/.settings ]; then
            echo "Found: /opt/hca/.settings"
            python3 -c "
          import json, sys
          with open('/opt/hca/.settings') as f:
              d = json.load(f)
          for k in list(d.keys()):
              kl = k.lower()
              if any(s in kl for s in ('token', 'auth', 'sas', 'secret', 'credential', 'password')):
                  d[k] = '*** REDACTED ***'
              elif any(s in kl for s in ('url', 'uri')):
                  val = str(d[k])
                  if any(sig in val for sig in ('sig=', 'token=', 'se=')):
                      d[k] = val.split('?')[0] + '?*** REDACTED ***'
          json.dump(d, sys.stdout, indent=2)
          print()
          " 2>/dev/null || echo "(failed to parse .settings)"
          else
            echo "(not found)"
          fi
          echo "::endgroup::"

          echo ""
          echo "::group::provjobd_config.json"
          if [ -f /opt/hca/provjobd_config.json ]; then
            echo "Found: /opt/hca/provjobd_config.json"
            python3 -m json.tool /opt/hca/provjobd_config.json 2>/dev/null || cat /opt/hca/provjobd_config.json
          else
            echo "(not found)"
          fi
          echo "::endgroup::"

          echo ""
          echo "Marker files:"
          for marker in .hca.lock environment.dirty; do
            if [ -f "/opt/hca/$marker" ]; then
              echo "  $marker: present ($(stat -c '%y' "/opt/hca/$marker" 2>/dev/null || stat -f '%Sm' "/opt/hca/$marker" 2>/dev/null || echo 'unknown time'))"
            else
              echo "  $marker: absent"
            fi
          done

      - name: HCA logs (last 1000 lines)
        run: |
          redact_tokens() {
            sed \
              -e 's/"authToken":"[^"]*"/"authToken":"***"/g' \
              -e 's/"token":"[^"]*"/"token":"***"/g' \
              -e 's/"diagnosticsSasUri":"[^"]*"/"diagnosticsSasUri":"***"/g' \
              -e 's/"sasUri":"[^"]*"/"sasUri":"***"/g' \
              -e 's/sig=[^&"]*/sig=***/g'
          }

          log="/opt/hca/logs/hosted-compute-agent.log"
          echo "::group::HCA file log"
          if [ -f "$log" ]; then
            total=$(wc -l < "$log")
            echo "Found: $log ($total total lines, showing last 1000)"
            echo "---"
            tail -1000 "$log" | redact_tokens
          else
            echo "(not found at $log)"
          fi
          echo "::endgroup::"

          echo ""
          echo "::group::journalctl (HCA service, last 200 lines)"
          journalctl -u hosted-compute-agent --no-pager -n 200 2>/dev/null | redact_tokens || echo "(journalctl unavailable)"
          echo "::endgroup::"

      - name: Systemd unit (HCA)
        run: |
          echo "::group::Service status"
          systemctl status hosted-compute-agent --no-pager 2>/dev/null || echo "(service not found or systemctl unavailable)"
          echo "::endgroup::"

          unit="/etc/systemd/system/hosted-compute-agent.service"
          if [ -f "$unit" ]; then
            echo ""
            echo "::group::Unit file ($unit)"
            cat "$unit"
            echo "::endgroup::"
          fi

      - name: Disk and mounts
        run: |
          echo "::group::Disk usage"
          df -h
          echo "::endgroup::"

          echo ""
          echo "::group::Mounts (non-virtual)"
          mount | grep -Ev '^(cgroup|proc|sys|tmpfs|devpts|securityfs|debugfs|pstore|bpf|hugetlbfs|mqueue|fusectl)' || true
          echo "::endgroup::"

      - name: Environment variables (non-secret)
        run: |
          echo "::group::Environment"
          env \
            | grep -Evi 'token|secret|password|key|credential|sig=|authorization' \
            | sort
          echo "::endgroup::"

      - name: Installed tools
        run: |
          check_tool() {
            local name="$1"; shift
            printf "%-12s" "$name:"
            "$@" 2>/dev/null | head -1 || echo "not found"
          }
          check_tool git       git --version
          check_tool docker    docker --version
          check_tool node      node --version
          check_tool python3   python3 --version
          check_tool go        go version
          check_tool java      java -version 2>&1
          check_tool dotnet    dotnet --version
          check_tool az        az version --output tsv 2>/dev/null
          check_tool gh        gh --version
          check_tool jq        jq --version
          check_tool curl      curl --version
          check_tool tar       tar --version
          check_tool zip       zip --version 2>&1

      - name: Running processes
        run: |
          echo "::group::Top 25 processes by memory"
          ps aux --sort=-%mem 2>/dev/null | head -26 || ps aux 2>/dev/null | head -26 || echo "(ps unavailable)"
          echo "::endgroup::"

      - name: Network
        run: |
          echo "Hostname: $(hostname)"
          echo ""
          echo "::group::IP addresses"
          ip -4 addr show 2>/dev/null | grep inet || ifconfig 2>/dev/null | grep "inet " || echo "(unavailable)"
          echo "::endgroup::"
          echo ""
          echo "::group::DNS config"
          grep -v '^#' /etc/resolv.conf 2>/dev/null | grep -v '^$' || echo "(unavailable)"
          echo "::endgroup::"
